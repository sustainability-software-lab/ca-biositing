# .readthedocs.yaml
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

  commands:
    # Install Pixi using asdf (the same approach as uw-ssec/rse-guidelines)
    - asdf plugin add pixi
    - asdf install pixi latest
    - asdf global pixi latest

    # Run the Pixi task defined in pixi.toml that builds docs for RTD
    # Set HATCH_VCS_VERSION to bypass the VCS version lookup that crashes in this environment
    - pixi install --frozen -e docs
    - export HATCH_VCS_VERSION=$(./scripts/get_version.sh) && NO_COLOR=1 pixi run rtd-publish

# MkDocs configuration file
mkdocs:
  configuration: mkdocs.yml
