# .readthedocs.yaml
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

  commands:
    # Install Pixi using asdf
    - asdf plugin add pixi
    - asdf install pixi latest
    - asdf global pixi latest

    # Initialize the docs environment
    # Use --frozen to ensure we use the lockfile and don't try to solve
    - pixi install --frozen -e docs

    # Run the documentation build
    # Set HATCH_VCS_VERSION to bypass the VCS version lookup that crashes in this environment
    - export HATCH_VCS_VERSION=$(grep -m 1 "version =" pixi.toml | cut -d '"' -f
      2) && NO_COLOR=1 pixi run --frozen -e docs rtd-publish

# MkDocs configuration file
mkdocs:
  configuration: mkdocs.yml
