ci:
  autoupdate_commit_msg: "chore: update pre-commit hooks"
  autofix_commit_msg: "style: pre-commit fixes"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v6.0.0"
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=10000"]
        exclude: ^exports/plots/
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-yaml
        exclude: ^mkdocs\.yml$
      - id: debug-statements
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace
        exclude: ^audit/portal/evidently/

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: "v4.0.0-alpha.8"
    hooks:
      - id: prettier
        types_or: [yaml, markdown, html, css, scss, javascript, json]
        args: [--prose-wrap=always, --ignore-unknown]
        exclude: ^(docs/api/|readthedocs\.yaml|exports/plots/|audit/output/|audit/portal/evidently/)

  - repo: https://github.com/codespell-project/codespell
    rev: "v2.4.2"
    hooks:
      - id: codespell
        exclude: (\.ipynb$|pixi\.lock|temp_external_datasets/|exports/plots/|audit/output/|audit/portal/)

  - repo: local
    hooks:
      - id: disallow-caps
        name: Disallow improper capitalization
        language: pygrep
        entry: Github
        exclude: .pre-commit-config.yaml

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: "0.37.4"
    hooks:
      - id: check-dependabot
      - id: check-github-workflows
